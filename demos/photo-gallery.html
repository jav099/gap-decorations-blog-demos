<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photo Gallery - CSS Gap Decorations Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #f5f5f0;
    --bg-card: #e8e8e0;
    --border-card: #ccc;
    --text-primary: #2c2c34;
    --text-label: #6b6b7d;
    --rule-color: #999;
    --accent-blue: #2563eb;
    --font-mono: "JetBrains Mono", monospace;
    --font-sans: "Outfit", sans-serif;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: var(--font-sans);
    background: var(--bg-primary);
    color: var(--text-primary);
    padding: 2.5rem 2rem;
    min-height: 100vh;
  }

  .caption {
    max-width: 580px;
    margin: 0 auto 1.75rem;
  }

  pre.caption {
    background: #e0e0d8;
    border-radius: 6px;
    padding: 12px 16px;
    overflow-x: auto;
  }

  pre.caption code {
    font-family: var(--font-mono);
    font-size: 0.75rem;
    line-height: 1.6;
    color: var(--accent-blue);
  }

  .controls {
    max-width: 580px;
    margin: 0 auto 1.25rem;
    display: flex;
    gap: 0.5rem;
  }

  button {
    font-family: var(--font-mono);
    font-size: 0.75rem;
    font-weight: 400;
    padding: 0.5em 1em;
    border-radius: 5px;
    border: 1px solid var(--border-card);
    background: var(--bg-card);
    color: var(--text-label);
    cursor: pointer;
    transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
  }

  button:hover {
    background: #ddd;
    border-color: #aaa;
  }

  button.active {
    border-color: var(--accent-blue);
    background: rgba(37, 99, 235, 0.08);
    color: var(--accent-blue);
  }

  .gallery {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(3, 140px);
    gap: 20px;
    max-width: 580px;
    margin: 0 auto;

    column-rule: 1px solid var(--rule-color);
    row-rule: 1px solid var(--rule-color);
    rule-visibility-items: normal;
    rule-inset: overlap-join;
  }

  .photo {
    border-radius: 8px;
    overflow: hidden;
    background: var(--bg-card);
  }

  .photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .photo:nth-child(1) {
    background: linear-gradient(135deg, #667eea, #764ba2);
  }
  .photo:nth-child(2) {
    background: linear-gradient(135deg, #f093fb, #f5576c);
  }
  .photo:nth-child(3) {
    background: linear-gradient(135deg, #43e97b, #38f9d7);
  }
  .photo:nth-child(4) {
    background: linear-gradient(135deg, #4facfe, #00f2fe);
  }
  .photo:nth-child(5) {
    background: linear-gradient(135deg, #fa709a, #fee140);
  }
  .photo:nth-child(6) {
    background: linear-gradient(135deg, #fccb90, #d57eeb);
  }
  .photo:nth-child(7) {
    background: linear-gradient(135deg, #a18cd1, #fbc2eb);
  }
</style>
</head>
<body>
<a href="../index.html" style="display:inline-block;margin:12px 16px;font-family:sans-serif;font-size:13px;color:#888;text-decoration:none;">&larr; All demos</a>

<pre class="caption" id="codeBox"><code>.grid-gallery {
  gap: 20px;
  column-rule: 1px solid #999;
  row-rule: 1px solid #999;
  rule-inset: overlap-join;
  rule-visibility-items: normal;
}</code></pre>

<div class="controls">
  <button class="active" onclick="setVisibility('normal')">normal</button>
  <button onclick="setVisibility('all')">all</button>
  <button onclick="setVisibility('between')">between</button>
  <button onclick="setVisibility('around')">around</button>
</div>

<div class="gallery" id="gallery">
  <div class="photo" style="grid-column: 1; grid-row: 1"><img src="https://picsum.photos/seed/mountain/300/200" alt="Mountain"></div>
  <div class="photo" style="grid-column: 2; grid-row: 1"><img src="https://picsum.photos/seed/sunset/300/200" alt="Sunset"></div>
  <!-- row 1, col 3-4: empty -->
  <div class="photo" style="grid-column: 1; grid-row: 2"><img src="https://picsum.photos/seed/forest/300/200" alt="Forest"></div>
  <!-- row 2, col 2-3: empty -->
  <div class="photo" style="grid-column: 4; grid-row: 2"><img src="https://picsum.photos/seed/coast/300/200" alt="Coast"></div>
  <div class="photo" style="grid-column: 1; grid-row: 3"><img src="https://picsum.photos/seed/desert/300/200" alt="Desert"></div>
  <div class="photo" style="grid-column: 2; grid-row: 3"><img src="https://picsum.photos/seed/lake/300/200" alt="Lake"></div>
  <div class="photo" style="grid-column: 3; grid-row: 3"><img src="https://picsum.photos/seed/canyon/300/200" alt="Canyon"></div>
  <!-- row 3, col 4: empty -->
</div>

<script>
  function setVisibility(value) {
    document.getElementById("gallery").style.setProperty("rule-visibility-items", value);
    document.querySelectorAll(".controls button").forEach(btn => {
      btn.classList.toggle("active", btn.textContent === value);
    });
    document.getElementById("codeBox").innerHTML = `<code>.grid-gallery {
  gap: 20px;
  column-rule: 1px solid #999;
  row-rule: 1px solid #999;
  rule-inset: overlap-join;
  rule-visibility-items: ${value};
}</code>`;
  }
</script>

</body>
</html>
